{% extends "base.html" %}
{% block content %}

<div class="card">
  <div class="card-header">添加账户</div>
  <div id="currencyFields">
    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
      <div class="field"><label>账户名</label><input id="accName" placeholder="工行储蓄卡" style="width:150px;"></div>
      <div class="field"><label>类型</label>
        <select id="accType" style="width:110px;">
          <option value="bank">借记卡</option>
          <option value="ewallet">电子钱包</option>
          <option value="credit">信用卡</option>
          <option value="loan">贷款</option>
          <option value="cash">现金</option>
          <option value="topup">充值账户</option>
          <option value="investment">投资账户</option>
        </select>
      </div>
      <div class="field"><label>币种</label>
        <div style="display:flex;gap:4px;align-items:center;"><input class="acc-currency" value="CNY" placeholder="CNY" style="width:60px;"><button class="btn btn-secondary" onclick="addCurrencyRow()" title="添加币种" style="height:22px;width:22px;padding:0;font-size:14px;">+</button></div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addAccount()">添加</button>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header">账户列表</div>
  <table style="table-layout:fixed;">
    <thead><tr>
      <th style="width:18%;">名称</th><th style="width:14%;">类型</th><th style="width:16%;">币种</th><th style="width:10%;">状态</th><th style="width:26%;">操作</th>
    </tr></thead>
    <tbody id="accList"></tbody>
  </table>
</div>

<script>
function addCurrencyRow() {
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:12px;align-items:flex-end;margin-top:8px;';
  div.innerHTML = `<div class="field" style="width:150px;"></div><div class="field" style="width:110px;"></div>
    <div class="field"><div style="display:flex;gap:4px;align-items:center;"><input class="acc-currency" placeholder="CNY" style="width:60px;"><button class="btn btn-danger" onclick="this.closest('div').parentElement.remove()" style="height:22px;width:22px;padding:0;font-size:14px;">×</button></div></div>`;
  document.getElementById('currencyFields').appendChild(div);
}

async function loadAccounts() {
  const r = await fetch('/api/accounts'); const data = await r.json();
  document.getElementById('accList').innerHTML = data.map(a => {
    if (window._editing === a.id) {
      var currencies = a.multi && a.currencies ? a.currencies.map(function(c) {
        return { id: c.id, currency: c.currency };
      }) : [{ id: a.id, currency: a.currency || '' }];
      var currHtml = '<div id="currList-' + a.id + '">' + currencies.map(function(c) {
        return '<div style="display:flex;gap:4px;align-items:center;margin-bottom:2px;"><input class="edit-multi-curr" value="' + c.currency + '" data-id="' + c.id + '" style="width:60px;"><button class="btn btn-danger btn-xs" onclick="removeCurrencyRow(this,\'' + c.id + '\')" style="font-size:10px;padding:0 6px;">×</button></div>';
      }).join('') + '<button class="btn btn-secondary btn-xs" onclick="addCurrencyRow(' + a.id + ')" style="margin-top:2px;">+ 币种</button></div>';
      return `<tr>
        <td><input id="editName" value="${a.name}" style="width:110px;"></td>
        <td><select id="editType" style="width:100px;">${Object.entries(typeLabels).map(([v,l]) => `<option value="${v}" ${a.type===v?'selected':''}>${l}</option>`).join('')}</select></td>
        <td style="font-size:12px;">${currHtml}</td>
        <td>${a.is_active ? '<span class="badge badge-green">在用</span>' : '<span class="badge badge-gray">停用</span>'}</td>
        <td><button class="btn btn-primary btn-xs" onclick="saveEdit(${a.id})">💾 保存</button>
            <button class="btn btn-secondary btn-xs" onclick="cancelEdit()">取消</button></td>
      </tr>`;
    }
    const toggleBtn = a.is_active
      ? `<button class="btn btn-xs" style="color:var(--kuchiba);" onclick="toggleAccount(${a.id},0,'${a.name}')">停用</button>`
      : `<button class="btn btn-xs" style="color:var(--matcha);" onclick="toggleAccount(${a.id},1,'${a.name}')">启用</button>`;
    const statusBadge = a.is_active
      ? '<span class="badge badge-green">在用</span>'
      : '<span class="badge badge-gray">停用</span>';
    let currencyDisplay = a.currency;
    if (a.multi && a.currencies) {
      currencyDisplay = '<span class="badge badge-blue">多币种</span> ' + a.currencies.map(c => `<span style="font-size:11px;color:var(--sumi-light);">${c.currency}</span>`).join(' ');
    }
    return `<tr>
      <td style="font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
        <span class="account-link" onclick="showAccountDetail(${a.id})">${a.name}</span>
      </td>
      <td><span class="badge ${typeColors[a.type] || 'badge-gray'}">${typeLabels[a.type] || a.type}</span></td>
      <td style="font-size:12px;">${currencyDisplay}</td>
      <td>${statusBadge}</td>
      <td>
        <button class="btn btn-secondary btn-xs" onclick="startEdit(${a.id})">✎ 编辑</button>
        ${toggleBtn}
        <button class="btn btn-danger btn-xs" onclick="deleteAccount(${a.id}, '${a.name}')">🗑 删除</button>
      </td>
    </tr>`;
  }).join('');
}

function startEdit(id) { window._editing = id; loadAccounts(); }
function cancelEdit() { window._editing = null; loadAccounts(); }

async function saveEdit(id) {
  const name = document.getElementById('editName').value.trim();
  const type = document.getElementById('editType').value;
  if (!name) return toast('请输入账户名', 'err');

  // Collect currencies from edit rows
  const multiCurrs = document.querySelectorAll('.edit-multi-curr');
  var currencies = [];
  for (const inp of multiCurrs) {
    var c = inp.value.trim().toUpperCase();
    if (c) currencies.push({ id: inp.dataset.id, currency: c });
  }

  // Save existing sub-account currencies
  for (const c of currencies) {
    if (c.id && c.id !== 'new') {
      await fetch('/api/accounts/' + c.id, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ currency: c.currency })
      });
    }
  }

  // Add new currencies — may convert single → multi
  for (const c of currencies) {
    if (!c.id || c.id === 'new') {
      var r = await fetch('/api/accounts/' + id + '/add-currency', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ currency: c.currency })
      });
      // If converted, add-currency changed parent; update id for name/type save
      var result = await r.json();
      if (result.converted && result.parent_id) id = result.parent_id;
    }
  }

  // Save name/type on main account
  var body = { name: name, type: type };
  if (currencies.length === 1 && !document.querySelector('.edit-multi-curr[data-id]')) {
    // Still single-currency: save currency too
    body.currency = currencies[0] ? currencies[0].currency : undefined;
  }

  await fetch('/api/accounts/' + id, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  window._editing = null;
  loadAccounts();
}

function addCurrencyRow(accId) {
  var list = document.getElementById('currList-' + accId);
  var div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:4px;align-items:center;margin-bottom:2px;';
  div.innerHTML = '<input class="edit-multi-curr" value="" placeholder="JPY" style="width:60px;" data-id="new"><button class="btn btn-danger btn-xs" onclick="this.parentElement.remove()" style="font-size:10px;padding:0 6px;">×</button>';
  list.insertBefore(div, list.lastElementChild);
}

function removeCurrencyRow(btn, subId) {
  if (subId !== 'new' && subId) {
    // Existing sub-account - delete via API
    showConfirm('删除币种', '确定删除吗？', async function() {
      await fetch('/api/accounts/' + subId, { method: 'DELETE' });
      btn.parentElement.remove();
    });
  } else {
    // New row that hasn't been saved yet - just remove
    btn.parentElement.remove();
  }
}

async function addAccount() {
  const name = document.getElementById('accName').value.trim();
  const type = document.getElementById('accType').value;
  const currencies = [...document.querySelectorAll('.acc-currency')].map(el => el.value.trim().toUpperCase()).filter(c => c);
  if (!name) return toast('请输入账户名', 'err');
  if (currencies.length === 0) return toast('至少需要一个币种', 'err');
  await fetch('/api/accounts', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name, type, currency: currencies[0], currencies, sort_order: 0 })
  });
  document.getElementById('accName').value = '';
  // Reset currency fields to just the first one
  const cf = document.getElementById('currencyFields');
  while (cf.children.length > 1) cf.lastElementChild.remove();
  document.querySelector('.acc-currency').value = '';
  loadAccounts();
}

async function toggleAccount(id, active, name) {
  const action = active ? '启用' : '停用';
  showConfirm(`${action}账户`, `确定要${action}「${name}」吗？`, async () => {
    await fetch(`/api/accounts/${id}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ is_active: active })
    });
    loadAccounts();
    toast(`已${action}`, 'ok');
  });
}

function deleteAccount(id, name) {
  showConfirm('删除账户', `确定要删除「${name}」吗？如有余额记录则仅停用。`, async () => {
    await fetch(`/api/accounts/${id}`, { method: 'DELETE' });
    loadAccounts();
    toast('已删除', 'ok');
  });
}

loadAccounts();
</script>

<div class="card">
  <div class="card-header">数据管理</div>
  <div style="display:flex;gap:12px;align-items:center;">
    <button class="btn btn-primary btn-sm" onclick="exportData()">📥 导出备份</button>
    <label class="btn btn-secondary btn-sm" style="cursor:pointer;">
      📤 导入备份
      <input type="file" id="importFile" accept=".enc" onchange="importData(this)" style="display:none;">
    </label>
    <span style="font-size:11px;color:var(--sumi-light);">支持全量备份还原，格式 ENC（加密）</span>
  </div>
</div>

<script>
async function exportData() {
  const pw = prompt('设置备份密码（至少4位）：');
  if (!pw || pw.length < 4) return toast('密码至少4位', 'err');
  const pw2 = prompt('再次输入密码确认：');
  if (pw !== pw2) return toast('两次密码不一致', 'err');
  try {
    const r = await fetch('/api/backup/export', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw})
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail); }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'ledger_backup.enc'; a.click();
    URL.revokeObjectURL(url);
    toast('加密备份已下载', 'ok');
  } catch(e) {
    toast('导出失败: ' + e.message, 'err');
  }
}

async function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const pw = prompt('输入备份密码：');
  if (!pw) return;
  const form = new FormData();
  form.append('password', pw);
  form.append('file', file);
  try {
    const r = await fetch('/api/backup/import/file', { method: 'POST', body: form });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail); }
    const result = await r.json();
    let msg = [];
    for (const [k, v] of Object.entries(result.imported)) {
      msg.push(`${k}: +${v}`);
    }
    if (result.errors && result.errors.length) msg.push('错误: ' + result.errors.join(', '));
    toast('导入完成: ' + msg.join(', '), 'ok');
    loadAccounts();
  } catch(e) {
    toast('导入失败: ' + e.message, 'err');
  }
  input.value = '';
}
</script>

{% endblock %}
