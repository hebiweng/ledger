{% extends "base.html" %}
{% block content %}

<!-- Investment summary -->
<div class="card">
  <div class="card-header">投资总览</div>
  <div class="summary-grid" id="portfolioSummary" style="grid-template-columns: repeat(6, 1fr);">
    <div class="summary-card">
      <div class="label">当前总市值</div>
      <div class="value" id="sumValue">—</div>
    </div>
    <div class="summary-card">
      <div class="label">总成本</div>
      <div class="value" id="sumCost">—</div>
    </div>
    <div class="summary-card">
      <div class="label">总盈亏</div>
      <div class="value" id="sumProfit">—</div>
    </div>
    <div class="summary-card">
      <div class="label">当日涨跌</div>
      <div class="value" id="sumChange">—</div>
    </div>
    <div class="summary-card">
      <div class="label">持仓标的</div>
      <div class="value" id="sumCount">—</div>
    </div>
    <div class="summary-card">
      <div class="label">累计手续费</div>
      <div class="value" id="sumFees">—</div>
    </div>
  </div>
</div>

<!-- Charts -->
<div class="card" id="pfCharts" style="display:none;">
  <div class="card-header">投资分析</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    <div><div class="chart-wrap" style="height:260px;"><canvas id="chartTypePie"></canvas></div></div>
    <div><div class="chart-wrap" style="height:260px;"><canvas id="chartPerfLine"></canvas></div></div>
  </div>
</div>

<!-- Portfolio -->
<div class="card">
  <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
    <span>持仓组合</span>
    <button class="btn btn-primary btn-sm" onclick="loadPortfolio(true)">🔄 刷新行情</button>
  </div>
  <div id="portfolio"><div style="color:var(--sumi-light);font-size:13px;">加载中...</div></div>
</div>

<!-- Investment account balances -->
<div class="card">
  <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
    <span>投资账户 <span style="font-weight:400;font-size:13px;color:var(--sumi-light);">余额 & 出入金</span></span>
  </div>
  <div id="invBalances"></div>
</div>

<!-- Add transaction -->
<div class="card">
  <div class="card-header">添加交易</div>
  <div class="form-grid-4">
    <div class="field"><label>日期</label><input id="invDate" type="date"></div>
    <div class="field"><label>类型</label>
      <select id="invType" onchange="onTypeChange()">
        <option value="buy">买入</option><option value="sell">卖出</option>
        <option value="dividend">分红</option><option value="deposit">入金</option><option value="withdraw">出金</option>
      </select></div>
    <div class="field"><label>资产类型</label>
      <select id="invAssetType" onchange="onAssetTypeChange()">
        <option value="stock">股票</option><option value="etf">ETF</option><option value="fund">场外基金</option>
        <option value="crypto">加密货币</option><option value="bond">债券</option><option value="option">期权</option>
        <option value="future">期货</option><option value="forex">外汇</option><option value="reit">REITs</option>
        <option value="index">指数</option><option value="commodity">大宗商品</option><option value="cash">现金/存款</option>
        <option value="other">其他</option>
      </select></div>
    <div class="field"><label>资产 / 标的</label><input id="invAsset" placeholder="QQQ / 600519 / 016452..."></div>

    <div class="field"><label>数量</label><input id="invQty" type="number" step="0.01" min="0.01"></div>
    <div class="field"><label>单价</label><input id="invPrice" type="number" step="0.01" min="0.01"></div>
    <div class="field"><label>手续费</label><input id="invFees" type="number" step="0.01" min="0" value="0"></div>
    <div class="field"><label>总金额</label><input id="invTotal" type="number" step="0.01" placeholder="数量×单价"></div>

    <div class="field"><label>币种</label><input id="invCurrency" value="USD"></div>
    <div class="field"><label>平台</label><input id="invPlatform" placeholder="富途 / 盈透"></div>
    <div class="field"><label>账户</label><select id="invAccount"><option value="">—</option></select></div>
    <div class="field"><label>备注</label><input id="invNotes"></div>

    <div class="field" style="justify-content:flex-end;"><input type="hidden" id="invEditId" value=""><button class="btn btn-primary" id="invSaveBtn" onclick="saveInvestment()">保存</button><button class="btn btn-secondary" id="invCancelBtn" style="display:none;" onclick="cancelEditInv()">取消编辑</button></div>
  </div>
</div>

<!-- DCA Plans -->
<div class="card">
  <div class="card-header">定投计划</div>
  <div id="dcaList"></div>
  <button class="btn btn-secondary btn-sm" style="margin-top:12px;" onclick="showDcaForm()">+ 添加定投</button>
  <div id="dcaForm" style="display:none; margin-top:12px; padding:12px; background:var(--washi); border-radius:6px;">
    <div class="form-grid-4">
      <div class="field"><label>标的</label><input id="dcaAsset" placeholder="QQQ / 016452"></div>
      <div class="field"><label>资产类型</label>
        <select id="dcaAssetType">
          <option value="stock">股票</option><option value="etf">ETF</option><option value="fund">场外基金</option>
          <option value="crypto">加密货币</option><option value="bond">债券</option><option value="future">期货</option>
          <option value="reit">REITs</option><option value="index">指数</option><option value="commodity">大宗商品</option>
          <option value="cash">现金/存款</option><option value="other">其他</option>
        </select></div>
      <div class="field"><label>每期金额</label><input id="dcaAmount" type="number" step="0.01" min="0.01"></div>
      <div class="field"><label>手续费</label><input id="dcaFees" type="number" step="0.01" min="0" value="0"></div>
      <div class="field"><label>频率</label>
        <select id="dcaFreq"><option value="weekly">每周</option><option value="biweekly">双周</option><option value="monthly" selected>每月</option></select></div>
      <div class="field"><label>下次执行</label><input id="dcaNext" type="date"></div>
      <div class="field"><label>币种</label><input id="dcaCurr" value="USD"></div>
      <div class="field"><label>平台</label><input id="dcaPlatform" placeholder="富途"></div>
      <div class="field"><label>投资账户</label><select id="dcaAccount"><option value="">—</option></select></div>
      <div class="field"><label>扣款账户</label><select id="dcaPayAccount"><option value="">—</option></select></div>
    </div>
    <div style="margin-top:10px; display:flex; gap:8px;">
      <input type="hidden" id="dcaEditId" value="">
      <button class="btn btn-primary btn-sm" onclick="saveDca()">保存</button>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('dcaForm').style.display='none'">取消</button>
    </div>
  </div>
</div>

<!-- Transaction list -->
<div class="card">
  <div class="card-header" style="display:flex;justify-content:space-between;">
    <span>交易记录</span>
    <span>
      <select id="invFilterYear" onchange="loadInvestments()"><option value="">全部</option></select>
      <select id="invFilterType" onchange="loadInvestments()">
        <option value="">全部</option><option value="buy">买入</option><option value="sell">卖出</option>
        <option value="dividend">分红</option><option value="deposit">入金</option><option value="withdraw">出金</option>
      </select>
    </span>
  </div>
  <table style="table-layout:fixed;">
    <thead><tr><th style="width:13%;">日期</th><th style="width:9%;">类型</th><th style="width:15%;">资产</th><th style="width:12%;">数量</th><th style="width:12%;">单价</th><th style="width:16%;">总金额</th><th style="width:11%;">平台</th><th style="width:6%;"></th></tr></thead>
    <tbody id="invList"></tbody>
  </table>
</div>

<script>
const atypeLabels = { stock:'股票', etf:'ETF', fund:'场外基金', crypto:'加密货币', bond:'债券', option:'期权', future:'期货', forex:'外汇', reit:'REITs', index:'指数', commodity:'大宗商品', cash:'现金', other:'其他' };
const atypeColors = { stock:'badge-blue', etf:'badge-teal', fund:'badge-green', crypto:'badge-red', bond:'badge-purple', option:'badge-orange', future:'badge-orange', forex:'badge-pink', reit:'badge-teal', index:'badge-gray', commodity:'badge-red', cash:'badge-green', other:'badge-gray' };
function atypeLabel(t) { return atypeLabels[t] || t; }
function atypeBadge(t) { return atypeColors[t] || 'badge-gray'; }
let investAccounts = [], allAccounts = [];

async function autoFillName(inputEl) {
  const code = inputEl.value.trim().toUpperCase();
  if (!code || code.length < 2) return;
  try {
    // Check portfolio cache for name
    const r = await fetch('/api/portfolio');
    const d = await r.json();
    const h = (d.holdings || []).find(h => h.asset_name.toUpperCase() === code);
    if (h && h.display_name && h.display_name !== code) {
      inputEl.placeholder = h.display_name;
      return;
    }
  } catch(e) {}
}

async function init() {
  document.getElementById('invDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('dcaNext').value = new Date().toISOString().slice(0,10);
  const r = await fetch('/api/accounts');
  allAccounts = await r.json();
  investAccounts = allAccounts.filter(a => a.type === 'investment');

  const sel = document.getElementById('invAccount');
  investAccounts.forEach(a => { sel.innerHTML += `<option value="${a.id}">${a.name}</option>`; });
  const dcaSel = document.getElementById('dcaAccount');
  investAccounts.forEach(a => { dcaSel.innerHTML += `<option value="${a.id}">${a.name}</option>`; });
  const paySel = document.getElementById('dcaPayAccount');
  allAccounts.filter(a => a.type !== 'investment').forEach(a => { paySel.innerHTML += `<option value="${a.id}">${a.name}</option>`; });

  document.getElementById('invQty').addEventListener('input', calcTotal);
  document.getElementById('invPrice').addEventListener('input', calcTotal);
  document.getElementById('invFees').addEventListener('input', calcTotal);

  // Auto-fill asset name on blur
  document.getElementById('invAsset').addEventListener('blur', function() { autoFillName(this); });
  document.getElementById('dcaAsset').addEventListener('blur', function() { autoFillName(this); });

  await startAutoRefresh();
  await loadBalances();
  await loadInvestments();
  await loadDcaPlans();
  await loadSummary();
}

function onTypeChange() {
  const t = document.getElementById('invType').value;
  const qtyEl = document.getElementById('invQty'), priceEl = document.getElementById('invPrice');
  if (t === 'dividend' || t === 'deposit' || t === 'withdraw') {
    qtyEl.style.display = 'none'; priceEl.style.display = 'none';
  } else {
    qtyEl.style.display = ''; priceEl.style.display = '';
  }
}

function calcTotal() {
  const qty = parseFloat(document.getElementById('invQty').value) || 0;
  const price = parseFloat(document.getElementById('invPrice').value) || 0;
  document.getElementById('invTotal').value = (qty * price).toFixed(2);
}

function onAssetTypeChange() {
  const t = document.getElementById('invAssetType').value;
  const curEl = document.getElementById('invCurrency');
  const defaults = { fund:'CNY', crypto:'USD', bond:'CNY', option:'USD', future:'USD', forex:'USD', commodity:'USD', cash:'CNY' };
  curEl.value = defaults[t] || curEl.value || 'USD';
}

// Portfolio
let portfolioTimer = null;
async function loadPortfolio(refresh) {
  const r = await fetch(`/api/portfolio?refresh=${refresh}`);
  const data = await r.json();
  const holdings = data.holdings || [];
  const summary = data.summary || {};

  // Update summary card
  if (summary.total_value_cny != null) {
    document.getElementById('sumValue').innerHTML = '¥' + summary.total_value_cny.toLocaleString();
    document.getElementById('sumCost').innerHTML = '¥' + summary.total_cost_cny.toLocaleString();
    const profitSign = summary.total_profit_cny >= 0 ? '+' : '';
    const profitClass = summary.total_profit_cny >= 0 ? 'positive' : 'negative';
    document.getElementById('sumProfit').innerHTML = `<span class="${profitClass}">${profitSign}¥${summary.total_profit_cny.toLocaleString()} (${profitSign}${summary.total_profit_pct}%)</span>`;
    const chgSign = (summary.daily_change_pct||0) >= 0 ? '+' : '';
    const chgClass = (summary.daily_change_pct||0) >= 0 ? 'positive' : 'negative';
    document.getElementById('sumChange').innerHTML = `<span class="${chgClass}">${chgSign}${summary.daily_change_pct}%</span></span>`;
    document.getElementById('sumCount').textContent = summary.holdings_count + ' 个';
    document.getElementById('sumFees').textContent = summary.total_fees_cny != null ? '¥' + summary.total_fees_cny.toLocaleString() : '¥0';

  // Render charts
  renderTypePie(holdings);
  loadPerformanceChart();
  }

  function renderTypePie(holdings) {
    if (!holdings.length) return;
    const typeMap = {};
    holdings.forEach(h => {
      const t = h.asset_type || 'other';
      typeMap[t] = (typeMap[t] || 0) + (h.current_value || 0);
    });
    const labels = Object.keys(typeMap);
    const data = Object.values(typeMap);
    const colors = { stock:'#4E79A7', etf:'#59A14F', fund:'#76B7B2', crypto:'#E15759', bond:'#B07AA1', option:'#F28E2B', future:'#F28E2B', forex:'#EDC948', reit:'#9C755F', index:'#BAB0AC', commodity:'#E15759', cash:'#59A14F', other:'#BAB0AC' };
    const typeNames = { stock:'股票', etf:'ETF', fund:'基金', crypto:'加密货币', bond:'债券', option:'期权', future:'期货', forex:'外汇', reit:'REITs', index:'指数', commodity:'商品', cash:'现金', other:'其他' };

    const ctx = document.getElementById('chartTypePie').getContext('2d');
    if (window._typePie) window._typePie.destroy();
    window._typePie = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: labels.map(l => typeNames[l] || l),
        datasets: [{ data, backgroundColor: labels.map(l => colors[l] || '#999'), borderWidth: 0 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { font: { size: 11 }, padding: 12 } },
          tooltip: { callbacks: { label: ctx => `${ctx.label}: ¥${Math.round(ctx.raw).toLocaleString()}` } }
        }
      }
    });
    document.getElementById('pfCharts').style.display = '';
  }

  async function loadPerformanceChart() {
    try {
      const r = await fetch('/api/portfolio/performance');
      const d = await r.json();
      if (!d.dates.length) return;
      const step = Math.max(1, Math.floor(d.dates.length / 100));
      const thin = a => a.filter((_, i) => i % step === 0);
      const lbls = d.dates.filter((_, i) => i % step === 0);

      const ctx = document.getElementById('chartPerfLine').getContext('2d');
      if (window._perfLine) window._perfLine.destroy();
      window._perfLine = new Chart(ctx, {
        type: 'line',
        data: {
          labels: lbls,
          datasets: [
            { label: '组合', data: thin(d.portfolio), borderColor: '#E06060', backgroundColor: 'transparent', tension:0.2, pointRadius:0, borderWidth:2.5 },
            { label: 'QQQ', data: thin(d.qqq), borderColor: '#5B9BD5', backgroundColor: 'transparent', tension:0.2, pointRadius:0, borderWidth:1.2, borderDash:[4,2] },
            { label: 'SPY', data: thin(d.spy), borderColor: '#7BC078', backgroundColor: 'transparent', tension:0.2, pointRadius:0, borderWidth:1.2, borderDash:[3,3] }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: { tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + (ctx.parsed.y >= 0 ? '+' : '') + ctx.parsed.y.toFixed(1) + '%' } } },
          scales: { y: { ticks: { callback: v => (v >= 0 ? '+' : '') + v.toFixed(0) + '%' } } }
        }
      });
      document.getElementById('pfCharts').style.display = '';
    } catch(e) {}
  }

  if (holdings.length === 0) {
    document.getElementById('portfolio').innerHTML = '<div style="color:var(--sumi-light);font-size:13px;">暂无持仓</div>';
    return;
  }
  document.getElementById('portfolio').innerHTML = `<table style="table-layout:fixed;">
    <thead><tr>
      <th style="width:9%;">代码</th><th style="width:14%;">名称</th><th style="width:7%;">类型</th><th style="width:10%;">持仓数量</th>
      <th style="width:12%;">总成本</th>
      <th style="width:10%;">现价</th><th style="width:7%;">涨跌</th><th style="width:10%;">盈亏</th><th style="width:5%;"></th>
    </tr></thead>
    <tbody>${holdings.map(h => {
      const profitClass = h.profit != null ? (h.profit >= 0 ? 'diff-positive' : 'diff-negative') : '';
      const profitDisplay = h.profit != null
        ? `<div>${h.profit_pct >= 0 ? '+' : ''}${h.profit_pct}%</div><div style="font-size:11px;color:var(--sumi-light);">${h.profit >= 0 ? '+' : '-'}$${Math.abs(h.profit).toLocaleString()}</div>`
        : '<span style="color:var(--sumi-light);font-size:11px;">点击刷新</span>';
      const changeClass = h.change_pct != null ? (h.change_pct >= 0 ? 'diff-positive' : 'diff-negative') : '';
      const changeDisplay = h.change_pct != null ? `${h.change_pct >= 0 ? '+' : ''}${h.change_pct}%` : '—';
      const quoteUrl = (() => {
        const sym = h.asset_name.toUpperCase();
        if (h.asset_type === 'crypto') return `https://www.tradingview.com/symbols/${sym}USD/`;
        if (h.asset_type === 'fund') return `https://fund.eastmoney.com/${sym}.html`;
        // Chinese A-share: detect exchange
        if (/^\d{6}$/.test(sym)) {
          if (sym.startsWith('60') || sym.startsWith('68') || sym.startsWith('5')) return `https://finance.yahoo.com/quote/${sym}.SS`;
          if (sym.startsWith('00') || sym.startsWith('30')) return `https://finance.yahoo.com/quote/${sym}.SZ`;
        }
        // HK: 1-5 digits
        if (/^\d{1,5}$/.test(sym)) return `https://finance.yahoo.com/quote/${sym.padStart(4,'0')}.HK`;
        return `https://finance.yahoo.com/quote/${sym}`;
      })();
      const nameDisplay = h.display_name || h.asset_name;
      const priceDisplay = h.current_price
        ? `<div>${h.current_price.toLocaleString()} ${h.currency}</div><div style="font-size:11px;color:var(--sumi-light);">均价 ${h.avg_cost.toLocaleString()}</div>`
        : '—';
      return `<tr>
        <td style="font-weight:500;"><a href="${quoteUrl}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline dotted;">${h.asset_name}</a></td>
        <td style="font-size:12px;color:var(--sumi-light);">${nameDisplay}</td>
        <td><span class="badge ${atypeBadge(h.asset_type)}">${atypeLabel(h.asset_type)}</span></td>
        <td class="num-col">${h.quantity.toLocaleString()}</td>
        <td class="num-col">${h.total_cost.toLocaleString()} ${h.currency}</td>
        <td class="num-col">${priceDisplay}</td>
        <td class="num-col ${changeClass}" style="font-weight:500;">${changeDisplay}</td>
        <td class="num-col ${profitClass}" style="font-weight:500;">${profitDisplay}</td>
        <td></td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

function startAutoRefresh() {
  if (portfolioTimer) clearInterval(portfolioTimer);
  portfolioTimer = setInterval(() => {
    if (document.visibilityState === 'visible') loadPortfolio(false);
  }, 60000);
  loadPortfolio(false);  // initial load from cache
}

function stopAutoRefresh() {
  if (portfolioTimer) { clearInterval(portfolioTimer); portfolioTimer = null; }
}

// DCA
let allDcaPlans = [];
async function loadDcaPlans() {
  const r = await fetch('/api/dca-plans');
  allDcaPlans = await r.json();
  if (allDcaPlans.length === 0) {
    document.getElementById('dcaList').innerHTML = '<div style="color:var(--sumi-light);font-size:13px;">暂无定投计划</div>';
    return;
  }
  // Fetch related investment records for stats
  const ir = await fetch('/api/investments'); const allRecs = await ir.json();
  const freqLabels = { daily:'每日', weekly:'每周', biweekly:'双周', monthly:'每月' };
  document.getElementById('dcaList').innerHTML = allDcaPlans.map(p => {
    // Compute stats: find buy records matching this plan's asset
    const buys = allRecs.filter(r => r.type === 'buy' && r.asset_name === p.asset_name && r.notes && r.notes.includes('定投'));
    const totalCost = buys.reduce((s, r) => s + r.total_amount + (r.fees || 0), 0);
    const totalShares = buys.reduce((s, r) => s + (r.quantity || 0), 0);
    const avgCost = totalShares > 0 ? totalCost / totalShares : 0;
    const curPx = 0; // will be filled by portfolio
    const curVal = 0; // will be filled by portfolio
    const ret = totalCost > 0 && curVal > 0 ? ((curVal - totalCost) / totalCost * 100) : null;
    const statusBadge = p.is_active ? '<span class="badge badge-green">进行中</span>' : '<span class="badge badge-gray">已暂停</span>';
    const pauseLabel = p.is_active ? '暂停' : '恢复';
    const pauseColor = p.is_active ? 'btn-xs' : 'btn-xs';
    return `<div class="summary-card" style="padding:14px 18px;margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:start;">
        <div style="flex:1;">
          <div style="font-weight:600;font-size:15px;">${p.asset_name}</div>
          <div style="font-size:12px;color:var(--sumi-light);margin-top:2px;">
            <span class="badge ${atypeBadge(p.asset_type)}">${atypeLabel(p.asset_type)}</span>
            ${p.frequency ? ' · '+freqLabels[p.frequency] : ''} · 每期 ${p.currency==='USD'?'$':'¥'}${p.amount.toLocaleString()}${p.fees ? ' (费率'+(p.fees/p.amount*100).toFixed(2)+'%)' : ''}
          </div>
          <div style="display:flex;gap:24px;margin-top:10px;font-size:13px;">
            <div><span style="color:var(--sumi-light);">已投</span> <b>${buys.length}期</b></div>
            <div><span style="color:var(--sumi-light);">累计投入</span> <b>${p.currency==='USD'?'$':'¥'}${totalCost.toLocaleString()}</b></div>
            <div><span style="color:var(--sumi-light);">累计份额</span> <b>${totalShares.toFixed(2)}</b></div>
            <div><span style="color:var(--sumi-light);">均价</span> <b>${p.currency==='USD'?'$':'¥'}${avgCost.toFixed(2)}</b></div>
            ${ret != null ? `<div><span style="color:var(--sumi-light);">收益率</span> <b class="${ret>=0?'diff-positive':'diff-negative'}">${ret>=0?'+':''}${ret.toFixed(2)}%</b></div>` : ''}
          </div>
        </div>
        <div style="text-align:right;white-space:nowrap;">
          <div style="font-size:12px;color:var(--sumi-light);">下次: ${p.next_date}</div>
          <div style="margin:4px 0;">${statusBadge}</div>
          <div style="display:flex;gap:4px;justify-content:flex-end;margin-top:8px;">
            <button class="btn btn-primary btn-xs" onclick="showExecuteDialog(${p.id})">立即定投</button>
            <button class="btn btn-secondary btn-xs" onclick="editDca(${p.id})">编辑</button>
            <button class="btn ${p.is_active ? 'btn-xs' : 'btn-xs'}" style="color:${p.is_active?'var(--kuchiba)':'var(--matcha)'};" onclick="toggleDca(${p.id},${p.is_active ? 0 : 1})">${pauseLabel}</button>
            <button class="btn btn-danger btn-xs" onclick="deactivateDca(${p.id})">删除</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function toggleDca(id, active) {
  await fetch(`/api/dca-plans/${id}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ is_active: active })
  });
  loadDcaPlans();
  toast(active ? '已恢复' : '已暂停', 'ok');
}

function showDcaForm() {
  document.getElementById('dcaEditId').value = '';
  document.getElementById('dcaAsset').value=''; document.getElementById('dcaAssetType').value='stock';
  document.getElementById('dcaAmount').value=''; document.getElementById('dcaFees').value='0';
  document.getElementById('dcaCurr').value='USD'; document.getElementById('dcaFreq').value='monthly';
  document.getElementById('dcaPlatform').value=''; document.getElementById('dcaAccount').value='';
  document.getElementById('dcaPayAccount').value='';
  document.getElementById('dcaNext').value = new Date().toISOString().slice(0,10);
  document.getElementById('dcaForm').style.display = 'block';
}

async function editDca(id) {
  const p = allDcaPlans.find(x => x.id === id);
  if (!p) return;
  document.getElementById('dcaEditId').value = p.id;
  document.getElementById('dcaAsset').value = p.asset_name;
  document.getElementById('dcaAssetType').value = p.asset_type || 'stock';
  document.getElementById('dcaAmount').value = p.amount;
  document.getElementById('dcaFees').value = p.fees || 0;
  document.getElementById('dcaCurr').value = p.currency;
  document.getElementById('dcaFreq').value = p.frequency;
  document.getElementById('dcaPlatform').value = p.platform || '';
  document.getElementById('dcaAccount').value = p.account_id || '';
  document.getElementById('dcaPayAccount').value = p.payment_account || '';
  document.getElementById('dcaNext').value = p.next_date;
  document.getElementById('dcaForm').style.display = 'block';
}

async function saveDca() {
  const body = {
    asset_name: document.getElementById('dcaAsset').value,
    asset_type: document.getElementById('dcaAssetType').value,
    amount: parseFloat(document.getElementById('dcaAmount').value),
    fees: parseFloat(document.getElementById('dcaFees').value) || 0,
    currency: document.getElementById('dcaCurr').value || 'USD',
    frequency: document.getElementById('dcaFreq').value,
    next_date: document.getElementById('dcaNext').value,
    platform: document.getElementById('dcaPlatform').value,
    account_id: document.getElementById('dcaAccount').value ? parseInt(document.getElementById('dcaAccount').value) : null,
    payment_account: document.getElementById('dcaPayAccount').value ? parseInt(document.getElementById('dcaPayAccount').value) : null,
  };
  if (!body.asset_name || isNaN(body.amount) || !body.next_date) return toast('请填写标的、金额、日期', 'err');
  const editId = document.getElementById('dcaEditId').value;
  const url = editId ? `/api/dca-plans/${editId}` : '/api/dca-plans';
  const method = editId ? 'PUT' : 'POST';
  await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  document.getElementById('dcaForm').style.display = 'none';
  loadDcaPlans();
  toast(editId ? '定投已更新' : '定投计划已创建', 'ok');
}

// Execute DCA with price choice
function showExecuteDialog(id) {
  document.getElementById('execDcaId').value = id;
  document.getElementById('execPrice').value = '';
  document.getElementById('execPriceRadio').checked = true;
  document.getElementById('execCustomRadio').checked = false;
  document.getElementById('execCustomPrice').value = '';
  document.getElementById('execCustomPrice').style.display = 'none';
  document.getElementById('dcaExecDialog').style.display = 'block';
  // overlay is dcaExecDialog itself
}
function toggleExecPrice() {
  const custom = document.getElementById('execCustomRadio').checked;
  document.getElementById('execCustomPrice').style.display = custom ? '' : 'none';
}
async function confirmExecuteDca() {
  const id = document.getElementById('execDcaId').value;
  let price = null;
  if (document.getElementById('execCustomRadio').checked) {
    price = parseFloat(document.getElementById('execCustomPrice').value);
    if (!price || price <= 0) return toast('请输入有效价格', 'err');
  }
  const params = new URLSearchParams();
  if (price) params.set('price', price);
  const url = `/api/dca-plans/${id}/execute?${params}`;
  const r = await fetch(url, { method:'POST' });
  const result = await r.json();
  document.getElementById('dcaExecDialog').style.display = 'none';
  // overlay is dcaExecDialog itself
  loadDcaPlans(); loadInvestments(); loadPortfolio(true); loadSummary();
  if (result.balance_ok === false) {
    toast('定投已执行，但扣款账户余额不足！', 'warn');
  } else {
    toast('定投已执行', 'ok');
  }
}
function closeExecDialog() {
  document.getElementById('dcaExecDialog').style.display = 'none';
  // overlay is dcaExecDialog itself
}

async function deactivateDca(id) {
  showConfirm('停用定投', '确定停用？', async () => {
    await fetch(`/api/dca-plans/${id}`, { method:'DELETE' });
    loadDcaPlans(); toast('已停用', 'ok');
  });
}

// Investments
async function saveInvestment() {
  const editId = document.getElementById('invEditId').value;
  const body = {
    date: document.getElementById('invDate').value,
    type: document.getElementById('invType').value,
    asset_name: document.getElementById('invAsset').value,
    asset_type: document.getElementById('invAssetType').value,
    quantity: parseFloat(document.getElementById('invQty').value) || null,
    price: parseFloat(document.getElementById('invPrice').value) || null,
    fees: parseFloat(document.getElementById('invFees').value) || 0,
    total_amount: parseFloat(document.getElementById('invTotal').value) || 0,
    currency: document.getElementById('invCurrency').value,
    platform: document.getElementById('invPlatform').value,
    account_id: document.getElementById('invAccount').value ? parseInt(document.getElementById('invAccount').value) : null,
    notes: document.getElementById('invNotes').value,
  };
  if (!body.date || !body.asset_name || !body.total_amount) return toast('请填写日期、标的、总金额', 'err');
  const url = editId ? `/api/investments/${editId}` : '/api/investments';
  const method = editId ? 'PUT' : 'POST';
  await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  resetInvForm();
  loadInvestments(); loadPortfolio(true); loadSummary();
  toast(editId ? '已更新' : '已保存', 'ok');
}

async function editInvestment(id) {
  const r = await fetch('/api/investments'); const data = await r.json();
  const inv = data.find(x => x.id === id);
  if (!inv) return toast('记录不存在', 'err');
  document.getElementById('invEditId').value = inv.id;
  document.getElementById('invDate').value = inv.date;
  document.getElementById('invType').value = inv.type;
  document.getElementById('invAssetType').value = inv.asset_type;
  document.getElementById('invAsset').value = inv.asset_name;
  document.getElementById('invQty').value = inv.quantity || '';
  document.getElementById('invPrice').value = inv.price || '';
  document.getElementById('invFees').value = inv.fees || 0;
  document.getElementById('invTotal').value = inv.total_amount;
  document.getElementById('invCurrency').value = inv.currency;
  document.getElementById('invPlatform').value = inv.platform || '';
  document.getElementById('invAccount').value = inv.account_id || '';
  document.getElementById('invNotes').value = inv.notes || '';
  document.getElementById('invSaveBtn').textContent = '更新';
  document.getElementById('invCancelBtn').style.display = '';
  onTypeChange();
}

function cancelEditInv() { resetInvForm(); }

function resetInvForm() {
  document.getElementById('invEditId').value = '';
  document.getElementById('invAsset').value=''; document.getElementById('invQty').value=''; document.getElementById('invPrice').value='';
  document.getElementById('invFees').value='0'; document.getElementById('invTotal').value=''; document.getElementById('invNotes').value='';
  document.getElementById('invPlatform').value=''; document.getElementById('invAccount').value='';
  document.getElementById('invDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('invType').value = 'buy';
  document.getElementById('invAssetType').value = 'stock';
  document.getElementById('invCurrency').value = 'USD';
  document.getElementById('invSaveBtn').textContent = '保存';
  document.getElementById('invCancelBtn').style.display = 'none';
  onTypeChange();
}

async function loadInvestments() {
  const year = document.getElementById('invFilterYear').value;
  const type = document.getElementById('invFilterType').value;
  let url = '/api/investments?'; if (year) url += `year=${year}&`; if (type) url += `type=${type}&`;
  const r = await fetch(url); const data = await r.json();
  const typeLabels = { buy: '买入', sell: '卖出', dividend: '分红', deposit: '入金', withdraw: '出金', dca_buy: '定投' };
  const typeColors = { buy: 'badge-blue', sell: 'badge-red', dividend: 'badge-green', deposit: 'badge-gray', withdraw: 'badge-gray', dca_buy: 'badge-blue' };
  document.getElementById('invList').innerHTML = data.map(inv => `<tr>
    <td>${inv.date}</td>
    <td><span class="badge ${typeColors[inv.type]||'badge-gray'}">${typeLabels[inv.type]||inv.type}</span></td>
    <td>${inv.asset_name}</td>
    <td class="num-col">${inv.quantity||'—'}</td>
    <td class="num-col">${inv.price ? inv.price.toLocaleString() : (inv.quantity && inv.total_amount ? Math.round(inv.total_amount/inv.quantity*100)/100 : '—')}</td>
    <td class="num-col" style="font-weight:500;">${inv.total_amount.toLocaleString()} ${inv.currency}</td>
    <td>${inv.platform}</td>
    <td><button class="btn btn-secondary btn-xs" onclick="editInvestment(${inv.id})">✎</button><button class="btn btn-danger btn-xs" onclick="deleteInvestment(${inv.id})">✕</button></td>
  </tr>`).join('');
  const years = [...new Set(data.map(inv => inv.date.slice(0,4)))];
  const ysel = document.getElementById('invFilterYear'); ysel.innerHTML = '<option value="">全部</option>';
  years.sort().reverse().forEach(y => { ysel.innerHTML += `<option value="${y}">${y}</option>`; });
}

async function deleteInvestment(id) {
  showConfirm('删除', '确定删除？', async () => {
    await fetch(`/api/investments/${id}`, { method:'DELETE' });
    toast('已删除','ok'); loadInvestments(); loadPortfolio(true); loadSummary();
  });
}

async function loadBalances() {
  const now = new Date();
  const [br, pr, ir] = await Promise.all([
    fetch(`/api/balances?year=${now.getFullYear()}&month=${now.getMonth()+1}`),
    fetch('/api/portfolio'),
    fetch('/api/investments')
  ]);
  const data = await br.json();
  const pfData = await pr.json();
  const allInvRecs = await ir.json();

  const invItems = data.items.filter(it => it.type === 'investment');
  if (invItems.length === 0) {
    document.getElementById('invBalances').innerHTML = '<div style="color:var(--sumi-light);font-size:13px;">暂无投资账户，请在 <a href="/accounts">账户管理</a> 中添加</div>';
    return;
  }

  // Build price map from portfolio
  const pxMap = {};
  (pfData.holdings || []).forEach(h => { pxMap[h.asset_name] = h.current_price || 0; });

  // Compute per-account portfolio value with currency tracking
  const acctPfVal = {}; // account_id -> {value, currency}
  const acctCurrency = {};
  invItems.forEach(it => { acctPfVal[it.account_id] = 0; acctCurrency[it.account_id] = it.currency; });
  allInvRecs.forEach(r => {
    if (r.type !== 'buy' && r.type !== 'sell') return;
    const px = pxMap[r.asset_name] || 0;
    const qty = r.quantity || 0;
    acctPfVal[r.account_id] = (acctPfVal[r.account_id] || 0) + qty * px;
  });

  document.getElementById('invBalances').innerHTML = `<div class="summary-grid">${invItems.map(it => {
    const curr = it.currency;
    const currSymbol = { USD:'$', CNY:'¥', HKD:'HK$', JPY:'¥', EUR:'€', GBP:'£' }[curr] || curr;
    const pfVal = acctPfVal[it.account_id] || 0;
    const showDetail = it.multi && it.subs ? it.subs.map(s => {
      const sCny = s.balance_cny != null ? `¥${s.balance_cny.toLocaleString()}` : '—';
      return `<div style="font-size:11px;color:var(--sumi-light);">${s.currency}: ${s.balance.toLocaleString()} → ${sCny}</div>`;
    }).join('') : '';
    return `<div class="summary-card" style="text-align:center;">
      <div class="label">
        <a href="javascript:void(0)" onclick="showAccountDetail(${it.account_id})" class="account-link">${it.account_name}</a>
      </div>
      <div style="display:flex;justify-content:center;gap:20px;margin:8px 0;">
        <div><span style="font-size:11px;color:var(--sumi-light);">现金</span><br><b style="font-size:15px;">${currSymbol}${it.balance.toLocaleString()}</b></div>
        <div><span style="font-size:11px;color:var(--sumi-light);">市值</span><br><b style="font-size:15px;">${currSymbol}${Math.round(pfVal).toLocaleString()}</b></div>
      </div>
      ${showDetail}
      <button class="btn btn-xs" style="background:var(--indigo-subtle);color:var(--indigo);" onclick="showTransferForm(${it.account_id},'${it.account_name}','${it.currency}')">⇄ 转账</button>
    </div>`;
  }).join('')}</div>`;
}

async function quickTransfer(accId, type, accName, currency) {
  const amt = prompt(`${type === 'deposit' ? '入金' : '出金'}金额 (${currency}):`);
  if (!amt || isNaN(parseFloat(amt)) || parseFloat(amt) <= 0) return toast('请输入有效金额', 'err');
  const now = new Date().toISOString().slice(0,10);
  await fetch('/api/investments', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      date: now, type: type, asset_name: accName, asset_type: 'cash',
      total_amount: parseFloat(amt), currency: currency, account_id: accId,
      fees: 0
    })
  });
  toast(`${type === 'deposit' ? '入金' : '出金'}已记录`, 'ok');
  loadInvestments(); loadPortfolio(true); loadBalances(); loadSummary();
}

function showTransferForm(fromId, fromName, currency) {
  document.getElementById('tfFromName').textContent = fromName;
  document.getElementById('tfFromId').value = fromId;
  document.getElementById('tfCurrency').value = currency;
  document.getElementById('tfDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('tfAmount').value = '';
  // Populate to-account selector (all accounts except the source)
  const sel = document.getElementById('tfToAccount');
  sel.innerHTML = '<option value="">— 选择转入账户 —</option>';
  allAccounts.forEach(a => {
    if (a.id !== fromId && a.is_active) {
      sel.innerHTML += `<option value="${a.id}">${a.name} (${a.currency})</option>`;
    }
  });
  document.getElementById('transferDialog').style.display = 'flex';
}

async function confirmTransfer() {
  const fromId = parseInt(document.getElementById('tfFromId').value);
  const toId = parseInt(document.getElementById('tfToAccount').value);
  const amount = parseFloat(document.getElementById('tfAmount').value);
  const currency = document.getElementById('tfCurrency').value;
  const date = document.getElementById('tfDate').value || new Date().toISOString().slice(0,10);
  if (!toId) return toast('请选择转入账户', 'err');
  if (!amount || amount <= 0) return toast('请输入有效金额', 'err');
  const r = await fetch('/api/transfers', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ from_account_id: fromId, to_account_id: toId, amount, currency, date })
  });
  const result = await r.json();
  if (!r.ok) return toast(result.detail, 'err');
  toast(result.msg, 'ok');
  document.getElementById('transferDialog').style.display = 'none';
  loadInvestments(); loadPortfolio(true); loadBalances(); loadSummary();
}

async function loadSummary() {
  // Portfolio cards are managed by loadPortfolio; this loads supplemental investment stats
  const r = await fetch('/api/stats/investment');
  // data available for future use: total_invested_cny, total_withdraw_cny, accounts
}

init();
</script>

<!-- DCA execute dialog -->
<div id="dcaExecDialog" class="overlay" style="display:none;">

    <div style="margin:12px 0;">
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;">

        <span>当前行情价（自动获取）</span>
      </label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">

      </label>
      <input type="number" id="execCustomPrice" min="0.01" step="0.0001" placeholder="输入买入价格" style="display:none;margin-top:8px;width:100%;">

    <input type="hidden" id="execDcaId" value="">
    <div class="confirm-actions">
      <button class="btn btn-secondary btn-sm" onclick="closeExecDialog()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="confirmExecuteDca()">确认执行</button>
    </div>
  </div>
</div>

<!-- Transfer dialog -->
<div id="transferDialog" class="overlay" style="display:none;">
  <div class="panel panel-narrow">
    <h3>账户转账</h3>
    <div style="margin:12px 0;">
      <div style="margin-bottom:8px;">从 <b id="tfFromName">—</b> 转出</div>
      <div class="field"><label>转入账户</label><select id="tfToAccount"></select></div>

  </div>
</div>

{% endblock %}
